<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" rx="18" fill="#446c3d"></rect>
  
  <!-- Inner Border -->
  <rect x="6" y="6" width="88" height="88" rx="14" fill="none" stroke="#f7ebac" stroke-width="2"></rect>
  
  <!-- Letters -->
  <text x="30" y="62" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-style="italic" font-weight="bold" fill="#f7ebac">V</text>
        
  <text x="70" y="62" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-style="italic" font-weight="bold" fill="#f7ebac">N</text>
  
  <!-- Decorative Diamond -->
  <polygon points="50,46 54,50 50,54 46,50" fill="#d56844"></polygon>
</svg>