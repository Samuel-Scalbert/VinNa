<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VinNa Wedding</title>

  <!-- Tailwind output -->
  <link href="../dist/output.css" rel="stylesheet">

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-neutral-50 text-neutral-800">

  <header class="text-center py-16">
    <h1 class="text-5xl font-serif">Vincent & Nathalie</h1>
    <p class="mt-4 text-lg">August 10, 2026</p>
  </header>

  <section
    x-data="{ open: false }"
    class="max-w-xl mx-auto text-center"
  >
    <button
      @click="open = !open"
      class="px-6 py-3 bg-black text-white rounded-xl"
    >
      Toggle Message
    </button>

    <p x-show="open" class="mt-4">
      We are so happy to celebrate with you 💍
    </p>
  </section>

</body>
</html>
