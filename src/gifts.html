<!-- GUESTBOOK / TESTIMONIALS -->
<section class="bg-neutral-100 py-16">
  <div class="max-w-3xl mx-auto px-6">

    <h2 class="text-3xl font-serif text-center text-emerald-700 mb-4">
      Laissez-nous des petits mots !
    </h2>

    <p class="text-center text-neutral-600 mb-10">
      Nous avons souhaité uo vous laisser la possibilité de déjà nous laisser des
      petits mots doux sur ce mur en attendant le jour J !
    </p>

    <form class="space-y-6">

      <!-- STAR RATING -->
      <div class="text-center">
        <p class="text-sm text-neutral-500 mb-2">
          Cliquez sur une étoile pour noter !
        </p>

        <div class="flex justify-center gap-2 text-2xl text-neutral-400">
          ★ ★ ★ ★ ★
        </div>
      </div>

      <!-- INPUTS -->
      <div class="grid md:grid-cols-2 gap-6">

        <div>
          <label class="block text-sm mb-1">Email</label>
          <input
            type="email"
            class="w-full border border-neutral-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-neutral-200"
          />
        </div>

        <div>
          <label class="block text-sm mb-1">Nom / Pseudonyme</label>
          <input
            type="text"
            class="w-full border border-neutral-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-neutral-200"
          />
        </div>

      </div>

      <!-- MESSAGE -->
      <div>
        <label class="block text-sm mb-1">Avis</label>
        <textarea
          rows="5"
          class="w-full border border-neutral-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-neutral-200"
        ></textarea>
      </div>

      <!-- BUTTON -->
      <div class="text-right">
        <button
          type="submit"
          class="bg-orange-300 hover:bg-orange-400 text-white px-8 py-2 rounded"
        >
          Valider
        </button>
      </div>

    </form>

  </div>
</section>
